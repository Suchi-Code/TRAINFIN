<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประมาณการค่าใช้จ่าย...</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--blue:#1a56db;--blue-light:#e8f0fe;--blue-dark:#1241b0;--gray-50:#f7f8fa;--gray-200:#d1d5db;--text:#1f2937;--navy:#0f2744;--accent:#e8a020;}
*{box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:var(--gray-50);color:var(--text);font-size:15px;line-height:1.6;margin:0;padding:0;}
.site-header{background:var(--navy);color:#fff;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.header-inner{max-width:1060px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.header-title{display:flex;align-items:center;gap:12px;}
.header-icon{width:38px;height:38px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.header-text h1{font-size:15px;font-weight:600;margin:0;}
.header-text p{font-size:11px;color:rgba(255,255,255,.55);margin:0;}
a.btn-nav{padding:6px 14px;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.8);background:transparent;border-radius:6px;font-family:'Sarabun',sans-serif;font-size:12px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:background .2s;}
a.btn-nav:hover{background:rgba(255,255,255,.1);color:#fff;}
#form-view{max-width:900px;margin:0 auto;padding:30px 20px 60px;}
.form-section{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:20px;overflow:hidden;}
.form-section-header{background:var(--blue-light);padding:12px 20px;font-weight:700;font-size:14px;color:var(--blue-dark);border-bottom:2px solid #c7d8f8;display:flex;align-items:center;gap:10px;}
.form-section-body{padding:20px;}
.form-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:14px;}
.form-row.single{grid-template-columns:1fr;}
.form-row.three{grid-template-columns:1fr 1fr 1fr;}
.form-group{display:flex;flex-direction:column;}
.form-group label{font-size:13px;font-weight:600;color:#374151;margin-bottom:5px;}
.form-group label .req{color:#ef4444;}
.form-group input[type=text],.form-group input[type=number]{border:1.5px solid var(--gray-200);border-radius:6px;padding:8px 12px;font-family:'Sarabun',sans-serif;font-size:14px;color:var(--text);transition:border-color .2s;background:#fff;}
.form-group input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.1);}
.form-group input[type=number]{text-align:right;}
.form-group input[readonly]{background:#edf0f5!important;color:#5a6a7a!important;border-color:var(--gray-200)!important;cursor:not-allowed;font-weight:500;}
.form-group input[disabled]{background:#f3f4f6!important;color:#9ca3af!important;border-color:var(--gray-200)!important;cursor:not-allowed;}
.sub-items{background:#fafbff;border:1px solid #e5e9f8;border-radius:8px;padding:14px;margin-top:6px;}
.sub-item-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.sub-item-row>label{font-size:13px;font-weight:600;color:#374151;flex:1;min-width:160px;}
.field-group{display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;}
.field-group label{font-size:12px;font-weight:600;color:#6b7280;white-space:nowrap;}
.field-group input{border:1px solid var(--gray-200);border-radius:5px;padding:6px 10px;font-family:'Sarabun',sans-serif;font-size:13px;text-align:right;width:120px;background:#fff;}
.field-group input:focus{outline:none;border-color:var(--blue);}
.spk-card{background:#f0f4ff;border:1px solid #d4e0fb;border-radius:8px;padding:12px 14px;margin-bottom:10px;position:relative;}
.spk-card-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.spk-num-badge{background:var(--blue-dark);color:#fff;font-size:11px;font-weight:700;border-radius:4px;padding:2px 8px;white-space:nowrap;}
.spk-name-input {
  width: 300px; 
  border: 1px solid var(--gray-200);
  border-radius: 5px;
  padding: 6px 10px;
  font-family: 'Sarabun', sans-serif;
  font-size: 13px;
}
.spk-name-input:focus{outline:none;border-color:var(--blue);}
.btn-del-spk {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 28px;
  height: 28px;
  background: #fee2e2;
  color: #ef4444;
  border: none;
  border-radius: 50%;
  font-size: 16px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s ease;
  padding: 0;
  line-height: 1;
}
.btn-del-spk:hover {
  background: #ef4444;
  color: #ffffff;
  transform: scale(1.1);
  box-shadow: 0 2px 6px rgba(239, 68, 68, 0.3);
}
.spk-fields{display:flex;flex-direction:column;gap:6px;padding-left:4px;margin-top:4px;max-width:420px;}
.spk-fields input{border:1px solid var(--gray-200);border-radius:5px;padding:5px 8px;font-family:'Sarabun',sans-serif;font-size:13px;text-align:right;width:100%;}
.spk-fields input:focus{outline:none;border-color:var(--blue);}
.spk-field-row{display:grid;grid-template-columns:180px 100px auto;align-items:center;column-gap:8px;}
.spk-field-row label{font-size:12px;font-weight:600;color:#6b7280;white-space:nowrap;}
.spk-field-row .unit{font-size:12px;color:#6b7280;white-space:nowrap;}
.btn-add-spk {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  padding: 7px 16px;
  background: #ecfdf5; 
  color: #047857; 
  border: 1.5px dashed #10b981; 
  border-radius: 6px;
  font-family: 'Sarabun', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s ease;
}
.btn-add-spk:hover {
  background: #d1fae5; 
  border-color: #059669; 
}
.opt-group{display:flex;gap:20px;flex-wrap:wrap;margin:6px 0 10px;}
.opt-group label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#374151;cursor:pointer;}
.opt-group input[type=radio],.opt-group input[type=checkbox]{width:15px;height:15px;cursor:pointer;}
.hint-row{background:#fffbe6;border:1px solid #fcd34d;border-radius:6px;padding:8px 12px;font-size:12px;color:#92400e;margin-bottom:10px;}
.cond-sec{display:none;}.cond-sec.show{display:block;}
.sec-divider{border:none;border-top:1px dashed #c7d8f8;margin:14px 0;}
.btn-row{display:flex;gap:12px;justify-content:center;margin-top:28px;}
.btn-print{background:linear-gradient(135deg,#1a56db,#1241b0);color:#fff;border:none;border-radius:8px;padding:13px 36px;font-family:'Sarabun',sans-serif;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(26,86,219,.35);transition:all .2s;display:flex;align-items:center;gap:8px;}
.btn-print:hover{background:linear-gradient(135deg,#1241b0,#0e3491);transform:translateY(-1px);}
.btn-preview{background:#fff;color:var(--blue);border:2px solid var(--blue);border-radius:8px;padding:13px 28px;font-family:'Sarabun',sans-serif;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;}
.btn-preview:hover{background:var(--blue-light);}

/* REPORT VIEW */
#report-view{display:none;max-width:1060px;margin:0 auto;padding:20px;zoom:0.9;}
.print-toolbar{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
.btn-back{padding:6px 14px;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.8);background:transparent;border-radius:6px;font-family:'Sarabun',sans-serif;font-size:12px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:background 0.2s;}
.btn-back:hover{background:rgba(255,255,255,.1);color:#fff;}
.btn-do-print{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;border-radius:8px;padding:10px 28px;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 3px 10px rgba(16,185,129,.3);display:flex;align-items:center;gap:6px;transition:all .2s;}
.btn-do-print:hover{background:linear-gradient(135deg,#059669,#047857);transform:translateY(-1px);}
.header-area{text-align:center;margin-bottom:30px;}
.header-area h1,.header-area p{font-size:14px!important;font-weight:700!important;color:#000;margin:4px 0;}
table.rpt{width:100%;border-collapse:collapse;font-size:14px;color:#000;table-layout:fixed;border:0.5px solid #555;}
table.rpt thead th{background:#fff;color:#000!important;padding:10px 4px;font-weight:700;border:0.5px solid #555;text-align:center;}
table.rpt tbody td{padding:var(--row-pad-v,5px) 10px;border:0.5px solid #555;vertical-align:middle;transition:padding .15s;}
.tl{text-align:left!important;} .tr{text-align:right!important;} .tc{text-align:center!important;} .tw{font-weight:700;}
.i1{padding-left:16px!important;} .i2{padding-left:32px!important;} .i3{padding-left:48px!important;}
.nb{border-bottom:none!important;} .nt{border-top:none!important;}
.bb2{border-bottom:0.5px solid #555!important;} .bt2{border-top:0.5px solid #555!important;} .bb3{border-bottom:0.5px solid #555!important;}
.bgray{background:#eaeaea!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.rpt-edit{border:none;border-bottom:1px dotted #999;background:transparent;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:400;color:#000;padding:0 2px;outline:none;line-height: 1.5;}
.rpt-edit-sm{width:80px;} .rpt-edit-md{width:140px;} .rpt-edit-lg{width:200px;}

/* PRINT CSS SPECIFIC OPTIMIZATION */
@media print{
  .site-header,.print-toolbar{display:none!important;}
  #form-view{display:none!important;} 
  #report-view{display:block!important;}
  body{background:#fff;padding:0; line-height: 1.35;} 
  .report-container{box-shadow:none;padding:0;max-width:100%;}
  .bgray{background:#eaeaea!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .rpt-edit{border:none!important;}
  .hdr-edit{border:none!important;border-bottom:none!important;}
  
  .note-row-2:has(input:placeholder-shown) {
    display: none !important;
  }
  @page { margin: 10mm; } 
  table.rpt { font-size: 13px; } 
  table.rpt thead th { padding: 4px 2px !important; } 
  
  .header-area { margin-bottom: 18px; text-align: center; } 
  
  .header-area h1 { 
    font-size: 18px;
    line-height: 1.6 !important;   
    margin: 0 0 10px 0 !important; 
  }
  
  .header-area p { 
    font-size: 14px;
    line-height: 1.5 !important;   
    margin: 0 0 4px 0 !important;  
  }
}

.btn-save-budget {
  background: linear-gradient(135deg, #10b981, #059669);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 13px 28px;
  font-family: 'Sarabun', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(16,185,129,0.35);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: 0.3px;
}
.btn-save-budget:hover {
  background: linear-gradient(135deg, #059669, #047857);
  box-shadow: 0 6px 20px rgba(16,185,129,0.45);
  transform: translateY(-2px);
}
.btn-save-budget:active { transform: translateY(0); }
.save-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1f2937;
  color: white;
  padding: 10px 22px;
  border-radius: 8px;
  font-family: 'Sarabun', sans-serif;
  font-size: 14px;
  font-weight: 600;
  opacity: 0;
  transition: all 0.3s;
  z-index: 9999;
  pointer-events: none;
}
.save-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.btn-save-pdf-05{background:#1a7a4a;color:#fff;border:none;border-radius:8px;padding:10px 22px;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;}
.btn-save-pdf-05:hover{background:#22a05e;}
.rpt-edit::placeholder { color:#aaa; font-style:italic; }
@media print {
  .rpt-edit { border:none !important; background:transparent !important; color:#000 !important; }
  .ie-ph-print:placeholder-shown { visibility:hidden; width:0; min-width:0; padding:0; margin:0; }
}


.btn-back-form{background:#fff;color:#374151;border:2px solid var(--gray-200);border-radius:8px;padding:10px 22px;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;}
.btn-back-form:hover{border-color:#9ca3af;transform:translateY(-1px);}
.spacing-ctrl{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid var(--gray-200);border-radius:8px;padding:6px 8px 6px 14px;box-shadow:0 2px 6px rgba(0,0,0,.05);}
.spacing-ctrl span{font-size:12px;font-weight:700;color:#374151;white-space:nowrap;}
.spacing-ctrl .sp-level{font-size:12px;font-weight:700;color:var(--blue);min-width:48px;text-align:center;}
.btn-sp{width:30px;height:30px;border:1.5px solid var(--gray-200);background:#fff;border-radius:6px;font-size:16px;font-weight:700;color:var(--blue-dark);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;}
.btn-sp:hover{background:var(--blue-light);border-color:var(--blue);}
.btn-sp:disabled{opacity:.35;cursor:not-allowed;}
.btn-sp:disabled:hover{background:#fff;border-color:var(--gray-200);}
.report-container{background:#fff;padding:40px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.05);--row-pad-v:5px;}
.double-bottom {
  border-bottom: 5px double #000 !important;
  background-clip: padding-box; 
}
@media print{ .print-toolbar{display:none!important;} }

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div id="form-view">
<header class="site-header">
  <div class="header-inner">
    <div class="header-title">
      <div class="header-icon">📊</div>
      <div class="header-text">
        <h1>รายงาน — งบประมาณค่าใช้จ่ายการฝึกอบรม</h1>
        <p>การประปาส่วนภูมิภาค (กปภ.) · กฝภ.1</p>
      </div>
    </div>
    <button onclick="confirmBack05()" style="display:inline-flex;align-items:center;gap:5px;padding:6px 14px;background:transparent;color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.3);border-radius:6px;font-family:'Sarabun',sans-serif;font-size:12px;cursor:pointer;text-decoration:none;transition:all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,.1)'; this.style.color='#fff';" onmouseout="this.style.background='transparent'; this.style.color='rgba(255,255,255,.8)管控';">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>ย้อนกลับ
    </button>
  </div>
</header>

<div class="form-section">
  <div class="form-section-header">📌 ข้อมูลหลักสูตร</div>
  <div class="form-section-body">
    <div class="form-row single"><div class="form-group"><label>ชื่อหลักสูตร <span class="req">*</span></label><input type="text" id="f_courseName" value="ความปลอดภัยในการทำงานเกี่ยวกับสารเคมีอันตราย และการตอบโต้กรณีเกิดเหตุฉุกเฉิน" readonly></div></div>
    <div class="form-row three">
      <div class="form-group"><label>รุ่นที่</label><input type="text" id="f_batch" value="1-3/69" readonly></div>
      <div class="form-group"><label>เลขที่รุ่นหลักสูตร</label><input type="text" id="f_courseNo" value="01320829" readonly></div>
      <div class="form-group"><label>วันที่จัดอบรม</label><input type="text" id="f_date" value="26 พฤษภาคม 2569" readonly></div>
    </div>
    <div class="form-row single"><div class="form-group"><label>สถานที่จัดอบรม</label><input type="text" id="f_location" value="การประปาส่วนภูมิภาคสาขาชัยนาท อำเภอเมืองชัยนาท จังหวัดชัยนาท" readonly></div></div>
  </div>
</div>

<div class="form-section" id="sec_fuel_wrap">
  <div class="form-section-header">
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0;font-weight:700;">
      <input type="checkbox" id="chk_fuel" onchange="onCondChange()" style="width:16px;height:16px;">
      ก. <span class="num-fuel">x</span>. ค่าน้ำมันเชื้อเพลิงและหล่อลื่น
    </label>
  </div>
  <div id="sec_fuel_body" class="form-section-body" style="display:none;"><div class="sub-items">
    <div class="sub-item-row"><label>ค่าน้ำมันเชื้อเพลิงและหล่อลื่น</label><div class="field-group"><label>งบประมาณ (บาท)</label><input type="number" id="f_fuel" value="0" step="0.01"></div></div>
  </div></div>
</div>

<div class="form-section" id="sec_office_wrap">
  <div class="form-section-header">
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0;font-weight:700;">
      <input type="checkbox" id="chk_office" checked onchange="onCondChange()" style="width:16px;height:16px;">
      ก. <span class="num-office">x</span>. ค่าวัสดุสำนักงาน
    </label>
  </div>
  <div id="sec_office_body" class="form-section-body"><div class="sub-items">
    <div class="sub-item-row" id="row_1_1">
      <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-weight:600; color:#374151;">
        <input type="checkbox" id="chk_1_1" checked onchange="document.getElementById('f_1_1').disabled = !this.checked; onCondChange();"> <span class="num-office">x</span>.<span class="sub-office-1">1</span> ค่าเครื่องเขียนแบบพิมพ์
      </label>
      <div class="field-group"><label>งบประมาณ (บาท)</label><input type="number" id="f_1_1" value="0" step="0.01"></div>
    </div>
    <div class="sub-item-row">
      <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-weight:600; color:#374151;">
        <input type="checkbox" id="chk_1_2" checked onchange="document.getElementById('f_1_2').disabled = !this.checked; onCondChange();"> <span class="num-office">x</span>.<span class="sub-office-2">2</span> ค่าถ่ายเอกสารและเข้าเล่ม
      </label>
      <div class="field-group"><label>งบประมาณ (บาท)</label><input type="number" id="f_1_2" value="0" step="0.01"></div>
    </div>
  </div></div>
</div>

<div class="form-section" id="sec_misc_wrap">
  <div class="form-section-header">
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0;font-weight:700;">
      <input type="checkbox" id="chk_misc" checked onchange="onCondChange()" style="width:16px;height:16px;">
      ก. <span class="num-misc">x</span>. ค่าวัสดุเบ็ดเตล็ด
    </label>
  </div>
  <div id="sec_misc_body" class="form-section-body"><div class="sub-items">
    <div class="sub-item-row"><label><span class="num-misc">x</span>.1 ค่าใช้จ่ายอื่นๆ (กระเป๋าผ้า, ถ่านกล้องถ่ายรูป, หน้ากากอนามัย, ฯลฯ)</label><div class="field-group"><label>งบประมาณ (บาท)</label><input type="number" id="f_2_1" value="0" step="0.01"></div></div>
  </div></div>
</div>

<div class="form-section" id="sec_lump_wrap">
  <div class="form-section-header">
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0;font-weight:700;">
      <input type="checkbox" id="chk_lump" onchange="onCondChange()" style="width:16px;height:16px;">
      ก. <span class="num-lump">x</span>. ค่าจ้างเหมา
    </label>
  </div>
  <div id="sec_lump_body" class="form-section-body" style="display:none;"><div class="sub-items">
    <div class="sub-item-row">

<script>
/* ============================================================
   STATE
============================================================ */
const spk={EXT:[]};
const venueData={ meeting:[], vip:[], staff:[] };

/* ============================================================
   BASIC TOGGLES
============================================================ */
function hasExternal(){ return document.getElementById('chk_external').checked; }
function hasInternal(){ return document.getElementById('chk_internal').checked; }
function hasPres(){ return document.getElementById('chk_pres')?.checked; }
function hasLump(){ return document.getElementById('chk_lump')?.checked; }
function hasVenue(){ return document.getElementById('chk_venue')?.checked; }
function hasFuel(){ return document.getElementById('chk_fuel')?.checked; }
function hasOffice(){ return document.getElementById('chk_office')?.checked; }
function hasMisc(){ return document.getElementById('chk_misc')?.checked; }
function hasFood(){ return document.getElementById('chk_food')?.checked; }
function hasStaffTravel(){ return document.getElementById('chk_stafftravel')?.checked; }
function hasOfficeItem1(){ return document.getElementById('chk_1_1')?.checked; }
function hasOfficeItem2(){ return document.getElementById('chk_1_2')?.checked; }
function hasFoodLunch(){ return document.getElementById('chk_3_1')?.checked; }
function hasFoodCoffee(){ return document.getElementById('chk_3_2')?.checked; }
function hasVenueMeeting(){ return hasVenue() && document.getElementById('chk_venue_meeting')?.checked; }
function hasVenueLodging(){ return hasVenue() && document.getElementById('chk_venue_lodging')?.checked; }
function hasVenueVip(){ return hasVenueLodging() && document.getElementById('chk_venue_vip')?.checked; }
function hasVenueStaff(){ return hasVenueLodging() && document.getElementById('chk_venue_staff')?.checked; }
function hasFoodDinner(){ return document.getElementById('chk_food_dinner')?.checked; }
function hasSpkLodging(){ return document.getElementById('chk_spk_lodging')?.checked; }
function hasSpkTravel(){ return document.getElementById('chk_spk_travel')?.checked; }
function isLumpPay(){ return document.querySelector('input[name=payType]:checked')?.value==='lump'; }
function hotelAmtOf(s){ return (s.hotelRate||0)*(s.hotelRooms||1)*(s.hotelNights||0); }
function travelAmtOf(s){ return (s.travel||0)*(s.travelDays||1); }
function travelDetailTxt(s){ return ieVal(`อัตราเหมาจ่าย ${fmt(s.travel||0)} บาท/วัน x ${s.travelDays||1} วัน`, '100%'); }
function flexLabelWithEdit(labelHtml, editHtml){
  return `<div style="display: flex; align-items: center; white-space: nowrap; gap: 8px;">
    <span>${labelHtml}</span>
    <div style="flex-grow: 1;">${editHtml}</div>
  </div>`;
}

/* ============================================================
   เลขข้อ ก. แบบ dynamic ตามช่องที่ติ๊ก
============================================================ */
function calcSectionNumbers(){
  let n=0;
  const nums={};
  if(hasFuel()){ n++; nums.fuel=n; }
  if(hasOffice()){ n++; nums.office=n; }
  if(hasMisc()){ n++; nums.misc=n; }
  if(hasLump()){ n++; nums.lump=n; }
  if(hasVenue()){ n++; nums.venue=n; }
  if(hasFood()){ n++; nums.food=n; }
  if(hasStaffTravel()){ n++; nums.stafftravel=n; }
  const ext=hasExternal();
  if(ext){
    n++; nums.ext1=n;
    const L=hasSpkLodging(), T=hasSpkTravel();
    if(L||T){ n++; nums.ext2=n; }
  }
  if(hasInternal()){ n++; nums.intTravel=n; n++; nums.intPayroll=n; }
  if(hasPres()){ n++; nums.pres=n; }
  nums.last=n;
  return nums;
}

function ThaiBaht(n) {
  n = Math.round(n * 100) / 100;
  let textNum = ['ศูนย์', 'หนึ่ง', 'สอง', 'สาม', 'สี่', 'ห้า', 'หก', 'เจ็ด', 'แปด', 'เก้า', 'สิบ'];
  let textUnit = ['', 'สิบ', 'ร้อย', 'พัน', 'หมื่น', 'แสน', 'ล้าน'];
  let s = String(n).split('.');
  let baht = s[0];
  let satang = s[1] || '00';
  if (satang.length === 1) satang += '0';

  function convert(str) {
    if (str === '0' || str === '') return '';
    let res = '';
    for (let i = 0; i < str.length; i++) {
      let num = parseInt(str.charAt(i));
      let pos = str.length - i - 1;
      if (num === 0) continue;
      if (num === 1 && pos === 0 && str.length > 1) res += 'เอ็ด';
      else if (num === 2 && pos === 1) res += 'ยี่';
      else if (num === 1 && pos === 1) res += '';
      else res += textNum[num];
      res += textUnit[pos];
    }
    return res;
  }

  let bahtText = convert(baht);
  let satangText = convert(satang);
  
  if (bahtText === '' && satangText === '') return 'ศูนย์บาทถ้วน';
  if (bahtText !== '') bahtText += 'บาท';
  if (satangText === '') satangText = 'ถ้วน';
  else satangText += 'สตางค์';
  
  return bahtText + satangText;
}

function venueMeetingTotal(){
  return venueData.meeting.reduce((a,e)=>a+e.rates.reduce((b,r)=>b+(r.rate||0)*(r.days||0),0),0);
}
function venueLodgingTotal(key){
  return venueData[key].reduce((a,e)=>a+e.rates.reduce((b,r)=>b+(r.rate||0)*(r.rooms||1)*(r.days||0),0),0);
}
function venueLodgingNights(key){
  return venueData[key].reduce((a,e)=>{
    const groupDays = e.rates.reduce((m,r)=>Math.max(m, r.days||0), 0);
    return a + groupDays;
  },0);
}

function stripDatePrefix(s){
  return String(s||'').trim().replace(/^(คืนวันที่|วันที่)\s*/,'');
}

function formatDateRangeTH(dates){
  const clean = (dates||[]).map(d=>stripDatePrefix(d)).filter(Boolean);
  if(clean.length===0) return '';
  if(clean.length===1) return clean[0];
  const dayRe=/^([0-9๐-๙]+)\s+(.+)$/;
  const parsed = clean.map(d=>{ const m=d.match(dayRe); return m ? {day:m[1], rest:m[2]} : null; });
  const sameRest = parsed.every(p=>p) && parsed.every(p=>p.rest===parsed[0].rest);
  if(sameRest){
    return `${parsed[0].day} - ${parsed[parsed.length-1].day} ${parsed[0].rest}`;
  }
  return clean.join(', ');
}

function _prefillMeta05(cd) {
  const sf = (id, val) => { const e = document.getElementById(id); if (e && val) e.value = val; };
  sf('f_courseName', cd.course);
  sf('f_batch',      cd.batch);
  sf('f_courseNo',   cd.no || cd.courseNo || '');
  sf('f_location',   cd.location);

  const months = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน',
                  'กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  function isoTh(iso) {
    if (!iso || !/^\d{4}-\d{2}-\d{2}$/.test(iso)) return iso || '';
    const p = iso.split('-');
    return `${parseInt(p[2])} ${months[parseInt(p[1])-1]} ${parseInt(p[0])+543}`;
  }
  function isoThRange(ds, de) {
    if (!ds) return '';
    if (!de || de === ds) return isoTh(ds);
    const ps = ds.split('-'), pe = de.split('-');
    if (ps[0]===pe[0] && ps[1]===pe[1])
      return `${parseInt(ps[2])} – ${parseInt(pe[2])} ${months[parseInt(ps[1])-1]} ${parseInt(ps[0])+543}`;
    if (ps[0]===pe[0])
      return `${parseInt(ps[2])} ${months[parseInt(ps[1])-1]} – ${parseInt(pe[2])} ${months[parseInt(pe[1])-1]} ${parseInt(ps[0])+543}`;
    return isoTh(ds) + ' – ' + isoTh(de);
  }
  const dateStr = cd.date || '';
  const ds = cd.dateStart || (dateStr.includes('_') ? dateStr.split('_')[0] : (/^\d{4}-\d{2}-\d{2}$/.test(dateStr) ? dateStr : ''));
  const de = cd.dateEnd   || (dateStr.includes('_') ? dateStr.split('_')[1] : '');
  sf('f_date', isoThRange(ds, de) || dateStr || '');
}

/* ============================================================
   CONVERT TO THAI NUMERALS
============================================================ */
function convertToThaiNumerals(node) {
  const thaiNums = ['๐','๑','๒','๓','๔','๕','๖','๗','๘','๙'];
  
  if (node.nodeType === 3) { // ถ้าเป็น Text Node (ข้อความปกติ)
    node.nodeValue = node.nodeValue.replace(/\d/g, d => thaiNums[d]);
  } else if (node.nodeType === 1) {
    if (node.tagName === 'INPUT' && node.type === 'number') return;
    
    if (node.tagName === 'INPUT' || node.tagName === 'TEXTAREA') {
      if (node.placeholder) node.placeholder = node.placeholder.replace(/\d/g, d => thaiNums[d]);
      if (node.type !== 'number' && node.value) {
        node.value = node.value.replace(/\d/g, d => thaiNums[d]);
      }
    } else {
      for (let child of node.childNodes) {
        convertToThaiNumerals(child);
      }
    }
  }
}

   GOOGLE SHEET API
============================================================ */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbySJROnBMkxFBNyPvET3DC5ihdCz03OPzvi2xXm6cMQpoPFsi2pAiTQAQIVSDUwQNVZ5w/exec';

async function gsApi(action, data, no) {
  // GET สำหรับ read, POST สำหรับ write
  try {
    let res;
    if (data) {
      const params = new URLSearchParams({ action, data: JSON.stringify(data) });
      if (no) params.append('no', no);
      res = await fetch(GAS_URL, { method: 'POST', body: params });
    } else {
      let url = GAS_URL + '?action=' + encodeURIComponent(action);
      if (no) url += '&no=' + encodeURIComponent(no);
      res = await fetch(url);
    }
    const json = await res.json();
    if (json.ok) return json.data;
    throw new Error(json.error || 'API error');
  } catch(e) {
    throw e;
  }
}

    document.getElementById('f_fuel').value = (fuel.amt !== undefined ? fuel.amt : budget.secFuel) || 0;

    document.getElementById('chk_office').checked = toggles.office !== undefined ? !!toggles.office : true;
    document.getElementById('chk_misc').checked   = toggles.misc   !== undefined ? !!toggles.misc   : true;
    document.getElementById('chk_food').checked   = toggles.food   !== undefined ? !!toggles.food   : true;

    const lump = spkParsedPre.lump || {};
    document.getElementById('chk_lump').checked = !!lump.on;

    document.getElementById('f_lump_vehicles').value = lump.vehicles || 0;

    document.getElementById('chk_venue').checked = !!venue.on;
    document.getElementById('chk_venue_meeting').checked = !!venue.meetingOn;
    document.getElementById('chk_venue_lodging').checked = !!venue.lodgingOn;
    document.getElementById('chk_venue_vip').checked = !!venue.vipOn;
    document.getElementById('chk_venue_staff').checked = !!venue.staffOn;
    venueData.meeting = venue.meeting || [];

    const migrateLodging = (arr) => (arr||[]).map(e => {
      if (e && Array.isArray(e.rates)) return e;
      return { date: e.date||'', rates: [{ rate: e.rate||0, rooms: e.rooms||1, days: e.days||0 }] };
    });
    venueData.vip = migrateLodging(venue.vip);
    venueData.staff = migrateLodging(venue.staff);

    const dinner = spkParsedPre.foodDinner || {};
    document.getElementById('chk_food_dinner').checked = !!dinner.on;
    document.getElementById('f_food_dinner_rate').value = dinner.rate || 0;
    document.getElementById('f_food_dinner_ppl').value = dinner.ppl || 0;
    document.getElementById('f_food_dinner_times').value = dinner.times || 1;
    document.getElementById('f_food_dinner_days').value = dinner.days || 0;
    if (budget.bb1 !== undefined) document.getElementById('f_b1').value = budget.bb1;
    if (budget.bb2 !== undefined) document.getElementById('f_b2').value = budget.bb2;
    if (budget.bb3 !== undefined) document.getElementById('f_b3').value = budget.bb3;
    const hasInt = (budget.secInternal||0) > 0
      || (budget.in_allowance||0) > 0 || (budget.in_lodging||0) > 0
      || (budget.in_travel||0)    > 0 || (budget.in_payroll||0) > 0
      || (budget.in1||0) > 0 || (budget.in2||0) > 0 || (budget.in3||0) > 0 || (budget.inPayroll||0) > 0;
    const chkInt = document.getElementById('chk_internal');
    if (chkInt) {
      chkInt.checked = hasInt;
      const secInt = document.getElementById('sec_internal');
      if (secInt) secInt.style.display = hasInt ? 'block' : 'none';
    }

    const spkParsed = (()=>{ try{ return typeof budget.spkJson==='string' ? JSON.parse(budget.spkJson) : (budget.spkJson||{}); }catch(e){return {};} })();
    const in1val  = budget.in_allowance !== undefined ? budget.in_allowance : (budget.in1 !== undefined ? budget.in1 : (spkParsed.in1||0));
    const in2val  = budget.in_lodging   !== undefined ? budget.in_lodging   : (budget.in2 !== undefined ? budget.in2 : (spkParsed.in2||0));
    const in3val  = budget.in_travel    !== undefined ? budget.in_travel    : (budget.in3 !== undefined ? budget.in3 : (spkParsed.in3||0));
    const inPval  = budget.in_payroll   !== undefined ? budget.in_payroll   : (budget.inPayroll !== undefined ? budget.inPayroll : (spkParsed.inPayroll||0));
    document.getElementById('f_in_1').value       = in1val;
    document.getElementById('f_in_2').value       = in2val;
    document.getElementById('f_in_3').value       = in3val;
    document.getElementById('f_in_payroll').value = inPval;

    const presParsed = spkParsed.pres || {};
    const pres1val = budget.pres1 !== undefined ? budget.pres1 : (presParsed.pres1||0);
    const pres2val = budget.pres2 !== undefined ? budget.pres2 : (presParsed.pres2||0);
    const pres3val = budget.pres3 !== undefined ? budget.pres3 : (presParsed.pres3||0);
    const chkPres = document.getElementById('chk_pres');
    if (chkPres) {
      chkPres.checked = !!presParsed.on || (budget.secPres||0)>0 || pres1val>0 || pres2val>0 || pres3val>0;
      const secPresEl = document.getElementById('sec_pres_body');
      if (secPresEl) secPresEl.style.display = chkPres.checked ? 'block' : 'none';
    }
    document.getElementById('f_pres_1').value = pres1val;
    document.getElementById('f_pres_2').value = pres2val;
    document.getElementById('f_pres_3').value = pres3val;
    const chkExt = document.getElementById('chk_external');
    if (chkExt) {

      chkExt.checked = (speakers && speakers.hasExternal !== undefined) ? !!speakers.hasExternal : true;
    }
    if (speakers) {
      if (speakers.payType) {
        const r = document.querySelector(`input[name=payType][value="${speakers.payType}"]`);
        if (r) r.checked = true;
      }
      if (Array.isArray(speakers.EXT)) {
        spk.EXT = speakers.EXT;
        document.getElementById('chk_spk_lodging').checked = !!speakers.hasLodging;
        document.getElementById('chk_spk_travel').checked = !!speakers.hasTravel;
      } else {
        if (speakers.C && speakers.C.length) {
          spk.EXT = speakers.C;
          document.getElementById('chk_spk_lodging').checked = true;
          document.getElementById('chk_spk_travel').checked = true;
        } else if (speakers.payType === 'lump' && speakers.A && speakers.A.length) {
          spk.EXT = speakers.A;
          document.getElementById('chk_spk_lodging').checked = false;
          document.getElementById('chk_spk_travel').checked = false;
        } else if (speakers.B && speakers.B.length) {
          spk.EXT = speakers.B;
          document.getElementById('chk_spk_lodging').checked = false;
          document.getElementById('chk_spk_travel').checked = false;
        }
      }
      if (spk.EXT && spk.EXT.length) renderSpk('EXT');
    }
    onCondChange();
  } catch(e) { console.warn('restoreBudgetForm error:', e); }
}

function computeBudget() {
  try {
    const has12 = document.getElementById('chk_1_2') && document.getElementById('chk_1_2').checked;
    const has11 = document.getElementById('chk_1_1') && document.getElementById('chk_1_1').checked;
    const has33 = document.getElementById('chk_3_3') && document.getElementById('chk_3_3').checked;
    const has31 = document.getElementById('chk_3_1') && document.getElementById('chk_3_1').checked;
    const has32 = document.getElementById('chk_3_2') && document.getElementById('chk_3_2').checked;

    const fuelOn=hasFuel();
    const secFuel = fuelOn ? v('f_fuel') : 0;

    const officeOn=hasOffice();
    const s11=(officeOn&&has11)?v('f_1_1'):0, s12=(officeOn&&has12)?v('f_1_2'):0;

    const miscOn=hasMisc();
    const s21=miscOn?v('f_2_1'):0;

    const foodOn=hasFood();
    const r31=v("f_3_1_rate"),p31=v("f_3_1_ppl"),m31=v("f_3_1_times")||1,d31=v("f_3_1_days");
    const r32=v("f_3_2_rate"),p32=v("f_3_2_ppl"),m32=v("f_3_2_times")||1,d32=v("f_3_2_days");
    const s31=(foodOn&&has31)?r31*p31*m31*d31:0, s32=(foodOn&&has32)?r32*p32*m32*d32:0, s33=(foodOn&&has33)?v('f_3_3'):0;
    const dinnerOn=hasFoodDinner();
    const rD=v('f_food_dinner_rate'),pD=v('f_food_dinner_ppl'),mD=v('f_food_dinner_times')||1,dD=v('f_food_dinner_days');
    const sD = (foodOn&&dinnerOn) ? rD*pD*mD*dD : 0;

    const stafftravelOn=hasStaffTravel();
    const s41=stafftravelOn?v('f_4_1'):0, s42=stafftravelOn?v('f_4_2'):0, s43=stafftravelOn?v('f_4_3'):0;

    const bb1=v('f_b1'),bb2=v('f_b2'),bb3=v('f_b3');
    const useInternal=hasInternal();

    const lumpOn=hasLump();
    const lRate=v('f_lump_rate'), lVeh=v('f_lump_vehicles'), lDays=v('f_lump_days');
    const secLump = lumpOn ? lRate*lVeh*lDays : 0;

    const venueOn=hasVenue();
    const mOn=hasVenueMeeting(), vipOn=hasVenueVip(), staffOn=hasVenueStaff();
    const secVenueMeeting = mOn ? venueMeetingTotal() : 0;
    const secVenueVip = vipOn ? venueLodgingTotal('vip') : 0;
    const secVenueStaff = staffOn ? venueLodgingTotal('staff') : 0;
    const secVenue = secVenueMeeting + secVenueVip + secVenueStaff;

    const L=hasSpkLodging(), T=hasSpkTravel(), lump=isLumpPay();
    const list = spk.EXT;
    const honorAmt = s => lump ? (s.amt||0) : (s.rate||0)*(s.hours||0);
    let secExt1=0, secExt2=0;
    const hasExt05 = hasExternal();
    if(hasExt05){
      if(!L && !T){
        secExt1 = list.reduce((a,s)=>a+honorAmt(s),0);
      } else if(L && !T){
        secExt1 = list.reduce((a,s)=>a+hotelAmtOf(s),0);
        secExt2 = list.reduce((a,s)=>a+honorAmt(s),0);
      } else if(!L && T){
        secExt1 = list.reduce((a,s)=>a+travelAmtOf(s),0);
        secExt2 = list.reduce((a,s)=>a+honorAmt(s),0);
      } else {
        secExt1 = list.reduce((a,s)=>a+hotelAmtOf(s)+travelAmtOf(s),0);
        secExt2 = list.reduce((a,s)=>a+honorAmt(s),0);
      }
    }

    let in1=0, in2=0, in3=0, inPayroll=0, inTravel=0, secInternal=0;
    if(useInternal){
      in1=v('f_in_1'); in2=v('f_in_2'); in3=v('f_in_3');
      inPayroll=v('f_in_payroll');
      inTravel=in1+in2+in3;
      secInternal=inTravel;
    }
    const presOn=hasPres();
    const pres1=presOn?v('f_pres_1'):0, pres2=presOn?v('f_pres_2'):0, pres3=presOn?v('f_pres_3'):0;
    const secPres = pres1+pres2+pres3;

    const gorTotal=secFuel+(s11+s12)+s21+secLump+secVenue+(s31+sD+s32+s33)+(s41+s42+s43)+secExt1+secExt2;
    const korTotal=bb1+bb2+bb3;

    const grandTotal=gorTotal+secInternal+secPres+korTotal+inPayroll;


    const speakersExtra = {
      EXT: JSON.parse(JSON.stringify(list)),
      payType: lump?'lump':'hourly',
      hasExternal: hasExt05,
      hasLodging: L, hasTravel: T,
      fuel: { on: fuelOn, amt: secFuel },
      toggles: { office: officeOn, misc: miscOn, food: foodOn, stafftravel: stafftravelOn,
                 office_1_1: has11, office_1_2: has12, food_lunch: has31, food_coffee: has32 },
      lump: { on: lumpOn, rate: lRate, vehicles: lVeh, days: lDays },
      venue: { on: venueOn, meetingOn: mOn, lodgingOn: hasVenueLodging(), vipOn, staffOn,
               meeting: JSON.parse(JSON.stringify(venueData.meeting)),
               vip: JSON.parse(JSON.stringify(venueData.vip)),
               staff: JSON.parse(JSON.stringify(venueData.staff)) },
      foodDinner: { on: dinnerOn, rate: rD, ppl: pD, times: mD, days: dD },
      in1, in2, in3, inPayroll, hasInternal: useInternal,
      pres: { on: presOn, pres1, pres2, pres3 }
    };

    return { sec1:s11+s12,s11,s12, sec2:s21,s21,
             secFuel, fuelOn,
             secLump, lRate, lVeh, lDays,
             secVenue, secVenueMeeting, secVenueVip, secVenueStaff,
             sec3: s31+sD+s32+s33, s31,s32,s33, sD, dinnerOn, rD,pD,mD,dD,
             r31,p31,m31,d31, r32,p32,m32,d32,
             sec4:s41+s42+s43,s41,s42,s43,
             secPres, pres1, pres2, pres3, presOn,
             sec5:secExt1, sec6:secExt2, secExt1, secExt2,
             secInternal, in1,in2,in3, inPayroll, inTravel,
             gorTotal, bb1,bb2,bb3, korTotal, grandTotal,
             hasExternal: hasExt05,
             speakersExtra,
             savedAt: new Date().toISOString() };
  } catch(e) { console.warn('computeBudget error:', e); return null; }
}

function saveBudgetSlot() {
  const course = (document.getElementById('f_courseName')||{}).value || '';
  const batch  = (document.getElementById('f_batch')||{}).value || '';
  const no     = (document.getElementById('f_courseNo')||{}).value || '';
  const date   = (document.getElementById('f_date')||{}).value || '';
  const location = (document.getElementById('f_location')||{}).value || '';

  if (!course) { showSaveToast('⚠️ กรุณาระบุชื่อหลักสูตรก่อนบันทึก'); return; }

  const budget05 = computeBudget();
  const budget   = budget05;
  const speakers = budget05.speakersExtra || {};

  const slots  = getSavedSlots();
  const now    = new Date().toLocaleString('th-TH', { dateStyle:'short', timeStyle:'short' });
  const id     = Date.now();

  let dateStart = '', dateEnd = '';
  try {
    const cd = JSON.parse(sessionStorage.getItem('courseData')||'{}');
    dateStart = cd.dateStart || '';
    dateEnd   = cd.dateEnd   || '';
  } catch{}
  try {
    const sd = JSON.parse(sessionStorage.getItem('budgetSlotData')||'{}');
    if (!dateStart) { dateStart = sd.dateStart || ''; dateEnd = sd.dateEnd || ''; }
  } catch{}

  const courseData = { course, batch, no, date, dateStart, dateEnd, location };
  const newSlot = { ...courseData, id, savedAt: now, budget, speakers };


  let idx = no ? slots.findIndex(s => s.no && s.no === no) : -1;
  if (idx < 0) idx = slots.findIndex(s => s.course === course && s.batch === batch);
  if (idx >= 0) {
    const existingActual06 = slots[idx].actual06;
    const existingActual   = slots[idx].actual;
    const existingActual07 = slots[idx].actual07;
    slots[idx] = { ...slots[idx], ...newSlot };
    if (existingActual06) slots[idx].actual06 = existingActual06;
    if (existingActual)   slots[idx].actual   = existingActual;
    if (existingActual07) slots[idx].actual07 = existingActual07;

    slots.unshift(newSlot);

    r31: budget.r31||0, p31: budget.p31||0, m31: budget.m31||1, d31: budget.d31||0,
    r32: budget.r32||0, p32: budget.p32||0, m32: budget.m32||1, d32: budget.d32||0,
    sD: budget.sD||0, rD: budget.rD||0, pD: budget.pD||0, mD: budget.mD||1, dD: budget.dD||0,
    s41: budget.s41||0, s42: budget.s42||0, s43: budget.s43||0, sec4: budget.sec4||0,
    secLump: budget.secLump||0, lRate: budget.lRate||0, lVeh: budget.lVeh||0, lDays: budget.lDays||0,
    secVenue: budget.secVenue||0, secVenueMeeting: budget.secVenueMeeting||0,
    secVenueVip: budget.secVenueVip||0, secVenueStaff: budget.secVenueStaff||0,
    sec5: budget.sec5||0, sec6: budget.sec6||0, secInternal: budget.secInternal||0,
    gorTotal: budget.gorTotal||0,
    bb1: budget.bb1||0, bb2: budget.bb2||0, bb3: budget.bb3||0,
    korTotal: budget.korTotal||0,
    budgetTotal: budget.grandTotal||0,
    grandTotal: budget.grandTotal||0,
    in_allowance: budget.in1      || 0,
    in_lodging:   budget.in2      || 0,

    secPres: budget.secPres||0, pres1: budget.pres1||0, pres2: budget.pres2||0, pres3: budget.pres3||0,
    spkJson: JSON.stringify(speakers||{}),
    savedAt: new Date().toISOString()
  });

  if (budget) {
    localStorage.setItem('budgetData', JSON.stringify(budget));

  }

  sessionStorage.setItem('courseData', JSON.stringify(courseData));

      let yOffset = 0;
      let page    = 0;

      while(yOffset < totalH){
        if(page > 0) pdf.addPage();

        const srcY  = Math.round((yOffset / ratio) * SCALE);
        const srcH  = Math.round((printH / ratio) * SCALE);
        const slice = document.createElement('canvas');
        slice.width  = imgW;
        slice.height = Math.min(srcH, imgH - srcY);
        const ctx = slice.getContext('2d');
        ctx.drawImage(canvas, 0, srcY, imgW, slice.height, 0, 0, imgW, slice.height);

        const sliceDataUrl = slice.toDataURL('image/png', 1);
        const sliceH = (slice.height / SCALE) * ratio;
        pdf.addImage(sliceDataUrl, 'PNG', MARGIN_L, MARGIN_T, printW, sliceH);

        yOffset += printH;
        page++;
      }

      pdf.save(fname + '.pdf');
    }).finally(()=>{
      document.body.removeChild(wrap);
      btn.disabled = false; btn.textContent = '💾 บันทึก PDF';
    });
  }, 300);
}
