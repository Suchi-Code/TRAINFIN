<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าสู่ระบบ | TMS กฝภ.1</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet" />
  
  <!-- 1. โหลด Supabase JS SDK via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:     #0B1F3A;
      --blue:     #1A56A8;
      --blue-lt: #2B6CC4;
      --accent:  #00A8E8;
      --gold:    #C8963E;
      --white:   #FFFFFF;
      --gray-2:  #A0AEBE;
      --err:     #D94F4F;
    }
    html, body { height: 100%; font-family: 'Sarabun', 'IBM Plex Sans Thai', sans-serif; background: var(--navy); color: var(--white); overflow: hidden; }
    
    /* ============================================================ */
    /* ✨ Fixed Background: Cyber Grid Layout & Full-Screen Rhythmic Aura */
    /* ============================================================ */
    .bg { position: fixed; inset: 0; z-index: 0; background: linear-gradient(180deg, #071528 0%, #0F2748 60%, #153969 100%); overflow: hidden; perspective: 600px; perspective-origin: 50% 50%; }
    
    /* 1. ดาวลอยลงมาจากด้านบน */
    .star-container { position: absolute; inset: 0; pointer-events: none; z-index: 2; }
    .star { position: absolute; border-radius: 50%; background: #fff; opacity: 0; animation: floatDown linear infinite; }
    .star:nth-child(1) { width: 3px; height: 3px; left: 15%; top: -10px; animation-duration: 18s; animation-delay: 0s; }
    .star:nth-child(2) { width: 4px; height: 4px; left: 40%; top: -10px; animation-duration: 22s; animation-delay: -4s; background: var(--accent); }
    .star:nth-child(3) { width: 2px; height: 2px; left: 65%; top: -10px; animation-duration: 15s; animation-delay: -2s; }
    .star:nth-child(4) { width: 5px; height: 5px; left: 85%; top: -10px; animation-duration: 25s; animation-delay: -7s; background: var(--gold); }
    .star:nth-child(5) { width: 3px; height: 3px; left: 30%; top: -10px; animation-duration: 20s; animation-delay: -5s; }
    .star:nth-child(6) { width: 4px; height: 4px; left: 75%; top: -10px; animation-duration: 19s; animation-delay: -1s; }

    /* 2. ตารางเน็ตเวิร์ก 3 มิติ */
    .cyber-grid { position: absolute; width: 160%; height: 160%; top: -30%; left: -30%; background-image: linear-gradient(rgba(0,168,232,0.08) 1.5px, transparent 1.5px), linear-gradient(90deg, rgba(0,168,232,0.08) 1.5px, transparent 1.5px); background-size: 55px 55px; transform: rotateX(55deg); transform-origin: center center; animation: gridMove 20s linear infinite; }
    
    /* 3. เลเยอร์ช่องออร่าสี่เหลี่ยม */
    .aura-grid-layer { position: absolute; width: 160%; height: 160%; top: -30%; left: -30%; display: grid; grid-template-columns: repeat(40, 1fr); grid-template-rows: repeat(40, 1fr); transform: rotateX(55deg); transform-origin: center center; animation: gridMove 20s linear infinite; pointer-events: none; }
    
    .aura-cell { width: 100%; height: 100%; opacity: 0; }
    
    .aura-cell.pulse-glow {
      animation: smoothAuraPulse 6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes smoothAuraPulse {
      0% {
        opacity: 0;
        background: rgba(255, 255, 255, 0);
        box-shadow: 0 0 0 rgba(255, 255, 255, 0);
      }
      35% {
        opacity: 1;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 
          0 0 22px 6px rgba(255, 255, 255, 0.9), 
          0 0 45px 16px rgba(0, 168, 232, 0.7),
          inset 0 0 8px rgba(255, 255, 255, 1);
      }
      50% {
        opacity: 0.9;
        background: rgba(255, 255, 255, 0.75);
      }
      100% {
        opacity: 0;
        background: rgba(255, 255, 255, 0);
        box-shadow: 0 0 0 rgba(255, 255, 255, 0);
      }
    }

    .bg-glow { position: absolute; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(0,168,232,0.12) 0%, transparent 70%); pointer-events: none; }

    @keyframes gridMove {
      0% { transform: rotateX(55deg) translateY(0); }
      100% { transform: rotateX(55deg) translateY(5.5%); }
    }

    @keyframes floatDown {
      0% { transform: translateY(-10px) translateX(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(110vh) translateX(-20px); opacity: 0; }
    }

    .shell { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { width: 100%; max-width: 440px; background: rgba(11,31,58,0.50); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05) inset; overflow: hidden; animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both; }
    .card-bar { height: 4px; background: linear-gradient(90deg, var(--blue) 0%, var(--accent) 50%, var(--gold) 100%); }
    .card-head { padding: 36px 40px 28px; text-align: center; }
    .logo-wrap { display: inline-flex; flex-direction: column; align-items: center; gap: 12px; }
    .logo-icon { width: 64px; height: 64px; border-radius: 16px; background: linear-gradient(135deg, var(--blue) 0%, var(--accent) 100%); display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(0,168,232,0.30); }
    .logo-icon svg { width: 34px; height: 34px; }
    .org-label { font-size: 11px; font-weight: 500; letter-spacing: 0.20em; text-transform: uppercase; color: var(--accent); }
    .sys-title { font-size: 22px; font-weight: 700; color: var(--white); line-height: 1.3; margin-top: 2px; }
    .sys-sub { font-size: 13px; color: var(--gray-2); margin-top: 4px; font-weight: 300; }
    .divider { height: 1px; margin: 0 40px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.10), transparent); }
    .card-body { padding: 28px 40px 36px; }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 12.5px; font-weight: 600; letter-spacing: 0.06em; color: var(--gray-2); margin-bottom: 8px; text-transform: uppercase; }
    .input-wrap { position: relative; }
    .input-wrap .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--gray-2); display: flex; align-items: center; pointer-events: none; transition: color 0.2s; }
    .input-wrap:focus-within .icon { color: var(--accent); }
    input[type="text"], input[type="password"] { width: 100%; padding: 12px 14px 12px 42px; background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 10px; color: var(--white); font-size: 15px; font-family: inherit; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s; outline: none; }
    input::placeholder { color: rgba(255,255,255,0.20); }
    input:focus { border-color: var(--accent); background: rgba(0,168,232,0.06); box-shadow: 0 0 0 3px rgba(0,168,232,0.12); }
    .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--gray-2); padding: 4px; display: flex; align-items: center; transition: color 0.2s; }
    .toggle-pw:hover { color: var(--accent); }
    .error-msg { display: none; margin-top: 10px; padding: 10px 14px; background: rgba(217,79,79,0.10); border: 1px solid rgba(217,79,79,0.30); border-radius: 8px; font-size: 13px; color: #F08080; text-align: center; }
    .error-msg.show { display: block; }
    .btn-login { width: 100%; margin-top: 8px; padding: 14px; background: linear-gradient(135deg, var(--blue-lt) 0%, var(--accent) 100%); border: none; border-radius: 10px; color: var(--white); font-size: 16px; font-weight: 700; font-family: inherit; letter-spacing: 0.04em; cursor: pointer; overflow: hidden; transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s; box-shadow: 0 6px 20px rgba(0,168,232,0.25); }
    .btn-login:hover { opacity: 0.94; transform: translateY(-1px); box-shadow: 0 10px 28px rgba(0,168,232,0.35); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; pointer-events: none; }
    .spinner { display: none; width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
    .loading .btn-text { display: none; }
    .loading .spinner { display: block; }
    .card-foot { padding: 0 40px 28px; text-align: center; }
    .card-foot p { font-size: 11.5px; color: rgba(255,255,255,0.20); line-height: 1.7; }
    .card-foot span { color: var(--gold); font-weight: 600; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 480px) { .card-head, .card-body, .card-foot { padding-left: 24px; padding-right: 24px; } .divider { margin: 0 24px; } }
  </style>
</head>
<body>

<div class="bg">
  <div class="bg-glow"></div>
  
  <div class="star-container">
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
  </div>

  <div class="cyber-grid"></div>
  <div class="aura-grid-layer" id="auraGrid"></div>
</div>

<div class="shell">
  <div class="card">
    <div class="card-bar"></div>
    <div class="card-head">
      <div class="logo-wrap">
        <div class="logo-icon">
          <svg viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M17 4C17 4 8 14.5 8 20.5C8 25.2 12.03 29 17 29C21.97 29 26 25.2 26 20.5C26 14.5 17 4Z" fill="white" fill-opacity="0.9"/>
            <circle cx="17" cy="20" r="4" fill="#0B1F3A"/>
            <line x1="17" y1="16" x2="17" y2="12" stroke="#0B1F3A" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="org-label">กปภ. &nbsp;·&nbsp; กฝภ.1</div>
          <div class="sys-title">ระบบบริหารจัดการฝึกอบรม</div>
          <div class="sys-sub">Training Management System</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="card-body">
      <div class="field">
        <label for="username">รหัสพนักงาน / รหัสผู้ใช้งาน</label>
        <div class="input-wrap">
          <input type="text" id="username" placeholder="กรอกรหัสพนักงาน (เช่น 12845)" autocomplete="username" />
          <span class="icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm4 1.5H4A1.5 1.5 0 0 0 2.5 11v1C2.5 13.38 4.9 14.5 8 14.5s5.5-1.12 5.5-2.5v-1A1.5 1.5 0 0 0 12 9.5Z"/>
            </svg>
          </span>
        </div>
      </div>

      <div class="field">
        <label for="password">รหัสผ่าน</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="กรอกรหัสผ่าน" autocomplete="current-password" />
          <span class="icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M11 5V4a3 3 0 1 0-6 0v1H4a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1h-1Zm-5-1a2 2 0 1 1 4 0v1H6V4Zm2 7a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Z"/>
            </svg>
          </span>
          <button class="toggle-pw" type="button" onclick="togglePw()" aria-label="แสดง/ซ่อนรหัสผ่าน">
            <svg id="eye-icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 3C4.5 3 1.5 5.5 1 8c.5 2.5 3.5 5 7 5s6.5-2.5 7-5c-.5-2.5-3.5-5-7-5Zm0 8a3 3 0 1 1 0-6 3 3 0 0 1 0 6Zm0-4.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3Z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="error-msg" id="errMsg">รหัสผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง</div>

      <button class="btn-login" id="btnLogin" onclick="doLogin()">
        <span class="btn-text">เข้าสู่ระบบ</span>
        <span class="spinner"></span>
      </button>
    </div>

    <div class="card-foot">
      <p>สงวนสิทธิ์เฉพาะเจ้าหน้าที่ <span>กองฝึกอบรมภูมิภาค 1</span><br>
      การเข้าใช้งานจะถูกบันทึกเพื่อความปลอดภัย</p>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // ⚡ 2. ตั้งค่า Supabase Connection
  // ⚠️ อย่าลืมเปลี่ยนค่า SUPABASE_URL และ SUPABASE_ANON_KEY ให้ตรงกับใน Supabase Dashboard
  // ============================================================
  const SUPABASE_URL      = 'https://YOUR_PROJECT_ID.supabase.co';
  const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
  const supabase          = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const MAIN_URL = 'training_courses_gfr1.html';
  let pwVisible  = false;

  // ============================================================
  // 🎵 ระบบสุ่มออร่ากระจายโซนความสมดุลหน้าจอ
  // ============================================================
  const auraGrid = document.getElementById('auraGrid');
  const gridCols = 40;
  const gridRows = 40;
  const totalCells = gridCols * gridRows;
  const cellsArray = [];

  for (let i = 0; i < totalCells; i++) {
    const cell = document.createElement('div');
    cell.classList.add('aura-cell');
    auraGrid.appendChild(cell);
    cellsArray.push(cell);
  }

  function triggerSingleRhythmicAura() {
    const zones = [
      { minCol: 20, maxCol: 33, minRow: 12, maxRow: 28 },
      { minCol: 8,  maxCol: 24, minRow: 14, maxRow: 32 }
    ];

    zones.forEach(zone => {
      const randomCol = Math.floor(Math.random() * (zone.maxCol - zone.minCol + 1)) + zone.minCol;
      const randomRow = Math.floor(Math.random() * (zone.maxRow - zone.minRow + 1)) + zone.minRow;
      
      const targetIndex = (randomRow * gridCols) + randomCol;
      const targetCell = cellsArray[targetIndex];

      if (targetCell && !targetCell.classList.contains('pulse-glow')) {
        targetCell.classList.add('pulse-glow');
        setTimeout(() => {
          targetCell.classList.remove('pulse-glow');
        }, 6000);
      }
    });

    const nextTickDelay = Math.floor(Math.random() * 400) + 400;
    setTimeout(triggerSingleRhythmicAura, nextTickDelay);
  }

  setTimeout(triggerSingleRhythmicAura, 600);

  // ============================================================
  // 🔑 ฟังก์ชันแสดง/ซ่อนรหัสผ่าน
  // ============================================================
  function togglePw() {
    const pw   = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    pwVisible  = !pwVisible;
    pw.type    = pwVisible ? 'text' : 'password';
    icon.innerHTML = pwVisible
      ? `<path stroke="currentColor" stroke-width="1.2" fill="none" d="M2 2l12 12M6.5 6.7A3 3 0 0 0 11 10m-5.2.8A3 3 0 0 1 5 8c0-.4.07-.78.2-1.13M3.5 3.9C2.3 4.9 1.5 6.4 1 8c.5 2.5 3.5 5 7 5a7 7 0 0 0 3.5-.95M6.5 3.2A7 7 0 0 1 8 3c3.5 0 6.5 2.5 7 5-.28 1.4-1 2.65-2 3.6"/>`
      : `<path d="M8 3C4.5 3 1.5 5.5 1 8c.5 2.5 3.5 5 7 5s6.5-2.5 7-5c-.5-2.5-3.5-5-7-5Zm0 8a3 3 0 1 1 0-6 3 3 0 0 1 0 6Zm0-4.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3Z"/>`;
  }

  // ============================================================
  // 🔐 ฟังก์ชัน Login ด้วย Supabase (แปลงรหัสพนักงานเป็น Email หลังบ้าน)
  // ============================================================
  async function doLogin() {
    const empId = document.getElementById('username').value.trim();
    const p     = document.getElementById('password').value;
    const btn   = document.getElementById('btnLogin');
    const err   = document.getElementById('errMsg');
    err.classList.remove('show');

    if (!empId || !p) {
      err.textContent = 'กรุณากรอกรหัสพนักงานและรหัสผ่าน';
      err.classList.add('show');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      // แอบแปลงรหัสพนักงานเป็นรูปแบบ Email เช่น "12845@trainfin.local"
      const formattedEmail = empId.includes('@') ? empId : `${empId}@trainfin.local`;

      // ยิงสเกนเข้าตรวจสอบข้อมูลกับ Supabase Auth
      const { data, error } = await supabase.auth.signInWithPassword({
        email: formattedEmail,
        password: p
      });

      if (error) {
        btn.classList.remove('loading');
        btn.disabled = false;
        err.textContent = 'รหัสพนักงานหรือรหัสผ่านไม่ถูกต้อง';
        err.classList.add('show');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      } else {
        // เข้าสู่ระบบสำเร็จ
        btn.querySelector('.btn-text').textContent = '✓ กำลังเข้าสู่ระบบ…';
        btn.classList.remove('loading');
        btn.style.background = 'linear-gradient(135deg,#1e7d5a,#27ae7a)';
        
        setTimeout(() => { 
          window.location.href = MAIN_URL; 
        }, 800);
      }
    } catch (e) {
      btn.classList.remove('loading');
      btn.disabled = false;
      err.textContent = 'ไม่สามารถเชื่อมต่อระบบได้ — กรุณาลองใหม่อีกครั้ง';
      err.classList.add('show');
    }
  }

  // รองรับการกด Enter เพื่อ Login
  ['username', 'password'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });
</script>
</body>
</html>
